<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StoryX-Ray · 小说人物关系抽取</title>
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="logo">📖</span>
    <div>
      <h1>StoryX-Ray</h1>
      <p class="subtitle">基于 LangExtract 的小说人物关系抽取</p>
    </div>
  </div>
  <div class="topbar-actions">
    <button id="open-config" type="button" class="btn-ghost" title="模型配置">
      <span class="icon">⚙</span>
      <span class="label">模型配置</span>
      <span id="config-summary" class="config-summary">未配置</span>
    </button>
    <a class="github" href="https://github.com/google/langextract" target="_blank" rel="noopener noreferrer">LangExtract ↗</a>
  </div>
</header>

<main class="layout">
  <!-- 左：输入 -->
  <section class="panel input-panel">
    <h2>输入文本</h2>
    <textarea id="novel-text" placeholder="粘贴一段小说文本……建议先用 1000~3000 字试跑"></textarea>
    <div class="char-count"><span id="char-count">0</span> 字</div>

    <button id="run-btn" type="button" class="primary">开始抽取</button>
    <div id="status" class="status"></div>
  </section>

  <!-- 右：结果 -->
  <section class="panel result-panel">
    <div class="tabs">
      <button class="tab active" type="button" data-tab="highlight">原文高亮</button>
      <button class="tab" type="button" data-tab="characters">人物</button>
      <button class="tab" type="button" data-tab="relations">关系</button>
      <button class="tab" type="button" data-tab="events">事件</button>
    </div>

    <div id="tab-highlight" class="tab-pane active">
      <div id="html-frame-wrap" class="frame-wrap">
        <p class="empty-tip">抽取完成后，这里会展示 LangExtract 原生高亮视图。</p>
      </div>
    </div>

    <div id="tab-characters" class="tab-pane">
      <div id="characters-list" class="chips"></div>
    </div>

    <div id="tab-relations" class="tab-pane">
      <table class="result-table">
        <thead><tr><th>人物 A</th><th>人物 B</th><th>关系</th><th>原文证据</th></tr></thead>
        <tbody id="relations-body"></tbody>
      </table>
    </div>

    <div id="tab-events" class="tab-pane">
      <table class="result-table">
        <thead><tr><th>涉及人物</th><th>概述</th><th>原文证据</th></tr></thead>
        <tbody id="events-body"></tbody>
      </table>
    </div>
  </section>
</main>

<!-- 模型配置弹窗 -->
<div id="config-modal" class="modal" hidden>
  <div class="modal-backdrop" data-close></div>
  <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="config-title">
    <header class="modal-header">
      <h2 id="config-title">模型配置</h2>
      <button class="modal-close" type="button" data-close aria-label="关闭">✕</button>
    </header>

    <div class="modal-body">
      <p class="modal-hint">配置保存在本地浏览器，不会上传服务器。留空字段会使用服务器 <code>.env</code> 中的默认值。</p>

      <div class="form-grid">
        <label>
          <span>LLM 后端</span>
          <select id="backend">
            <option value="gemini">Gemini API</option>
            <option value="ollama">Ollama 本地</option>
            <option value="deepseek">DeepSeek V4</option>
            <option value="openai">OpenAI 兼容</option>
          </select>
        </label>

        <label>
          <span>模型 ID</span>
          <input id="model" type="text" placeholder="留空使用默认值" />
        </label>

        <label id="api-key-row">
          <span>API Key</span>
          <input id="api-key" type="password" placeholder="留空使用 .env 默认值" />
        </label>

        <label id="base-url-row">
          <span>Base URL</span>
          <input id="base-url" type="text" placeholder="留空使用默认值" />
        </label>

        <label>
          <span>抽取轮数</span>
          <input id="passes" type="number" min="1" max="5" value="1" />
        </label>

        <label>
          <span>窗口字符数</span>
          <input id="char-buffer" type="number" min="200" max="8000" step="100" value="1500" />
        </label>
      </div>
    </div>

    <footer class="modal-footer">
      <button class="btn-ghost" type="button" data-close>取消</button>
      <button id="config-save" type="button" class="primary">保存</button>
    </footer>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
